<script>
function fixSVG() {

  document.querySelectorAll('symbol image[preserveAspectRatio="none"]').forEach(el => {
    el.removeAttribute("preserveAspectRatio");
  });

  document.querySelectorAll('.excalidraw-embedded-img svg').forEach(svg => {
    if (svg.getAttribute("width") !== "100%") {
      svg.setAttribute("width", "100%");
    }
  });

}

fixSVG();

const observer = new MutationObserver(() => fixSVG());

observer.observe(document.documentElement, {
  childList: true,
  subtree: true
});

/* dein funktionierender light mode */
document.documentElement.classList.remove("theme-dark");
document.documentElement.classList.add("theme-light");

/* 🔻 WARTEN BIS BODY DA IST */
window.addEventListener("DOMContentLoaded", () => {

  document.body.classList.remove("theme-dark");
  document.body.classList.add("theme-light");

  /* 🔻 simpler footer */
  const footer = document.createElement("div");
  footer.textContent = "© 2026 Joel Dankert";

  footer.style.position = "fixed";
  footer.style.bottom = "0";
  footer.style.left = "0";
  footer.style.width = "100%";
  footer.style.background = "#000";
  footer.style.color = "#fff";
  footer.style.textAlign = "center";
  footer.style.fontSize = "12px";
  footer.style.padding = "6px 0";
  footer.style.zIndex = "9999";

  document.body.appendChild(footer);

});
</script>
