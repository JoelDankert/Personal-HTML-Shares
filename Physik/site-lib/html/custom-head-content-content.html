<script>
function fixSVG() {
  document.querySelectorAll('symbol image[preserveAspectRatio="none"]').forEach(el => {
    el.removeAttribute("preserveAspectRatio");
  });

  document.querySelectorAll('.excalidraw-embedded-img svg').forEach(svg => {
    svg.setAttribute("width", "100%");
  });
}

function forceLightMode() {
  document.documentElement.classList.remove("theme-dark");
  document.documentElement.classList.add("theme-light");

  if (document.body) {
    document.body.classList.remove("theme-dark");
    document.body.classList.add("theme-light");
  }
}

function addFooterStyle() {
  if (document.getElementById("jd-footer-style")) return;

  const style = document.createElement("style");
  style.id = "jd-footer-style";
  style.textContent = `
    html::after {
      content: "© 2026 Joel Dankert";
      position: fixed;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: #000;
      background: transparent;
      padding: 0;
      z-index: 9999;
      pointer-events: none;
      font-family: Arial, sans-serif;
      white-space: nowrap;
    }
  `;
  document.head.appendChild(style);
}

/* run once */
fixSVG();
forceLightMode();
addFooterStyle();

/* run again after page is ready */
document.addEventListener("DOMContentLoaded", () => {
  fixSVG();
  forceLightMode();
});

window.addEventListener("load", forceLightMode);

/* only watch for new content, not class changes */
new MutationObserver(() => {
  fixSVG();
}).observe(document.documentElement, {
  childList: true,
  subtree: true
});
</script>
