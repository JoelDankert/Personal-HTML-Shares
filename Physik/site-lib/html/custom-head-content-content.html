<script>
function fixSVG() {
  document.querySelectorAll('symbol image[preserveAspectRatio="none"]').forEach(el => {
    el.removeAttribute("preserveAspectRatio");
  });

  document.querySelectorAll('.excalidraw-embedded-img svg').forEach(svg => {
    svg.setAttribute("width", "100%");
  });
}

function forceLightMode() {
  document.documentElement.classList.remove("theme-dark");
  document.documentElement.classList.add("theme-light");

  if (document.body) {
    document.body.classList.remove("theme-dark");
    document.body.classList.add("theme-light");
  }
}

function addFooterStyle() {
  if (document.getElementById("jd-footer-style")) return;

  const style = document.createElement("style");
  style.id = "jd-footer-style";
  style.textContent = `
    html::after {
      content: "© 2026 Joel Dankert";
      position: fixed;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: #000;
      background: transparent;
      padding: 0;
      z-index: 9999;
      pointer-events: none;
      font-family: Arial, sans-serif;
      white-space: nowrap;
    }
  `;
  document.head.appendChild(style);
}

function installEarlyLinkFix() {
  const maxAttempts = 200;
  let attempts = 0;

  const timer = window.setInterval(() => {
    attempts += 1;

    if (window.ObsidianSite && typeof window.ObsidianSite.loadURL === "function") {
      window.clearInterval(timer);

      const site = window.ObsidianSite;
      if (site.__jdEarlyLinkFixInstalled) return;

      const originalLoadURL = site.loadURL.bind(site);
      site.__jdEarlyLinkFixInstalled = true;

      site.loadURL = async function(url, pushState = true) {
        if (!this.document) {
          return;
        }

        return originalLoadURL(url, pushState);
      };

      if (window.LinkHandler && !window.LinkHandler.__jdInitializeLinksPatched) {
        window.LinkHandler.__jdInitializeLinksPatched = true;

        window.LinkHandler.initializeLinks = function(onElement) {
          onElement?.querySelectorAll(".internal-link, a.tag, a.tree-item-self, a.footnote-link").forEach(link => {
            if (link.__jdLinkHandlerInstalled) return;
            link.__jdLinkHandlerInstalled = true;

            const target = link.getAttribute("href");
            if (!target) return;

            link.addEventListener("click", event => {
              event.preventDefault();
              event.stopPropagation();

              if (window.ObsidianSite?.document) {
                window.ObsidianSite.loadURL(target);
              } else {
                window.location.href = target;
                return;
              }

              if (window.ObsidianSite?.deviceSize === "phone") {
                const leftSidebar = link.closest("#left-sidebar");
                const rightSidebar = link.closest("#right-sidebar");

                if (leftSidebar && window.ObsidianSite.leftSidebar?.collapsed === false) {
                  window.ObsidianSite.leftSidebar.collapsed = true;
                } else if (rightSidebar && window.ObsidianSite.rightSidebar?.collapsed === false) {
                  window.ObsidianSite.rightSidebar.collapsed = true;
                }
              }
            });

            if (
              target &&
              !target.startsWith("http") &&
              typeof window.ObsidianSite?.documentExists === "function" &&
              !window.ObsidianSite.documentExists(target)
            ) {
              link.classList.add("is-unresolved");
            } else if (
              link.classList.contains("internal-link") &&
              !window.ObsidianSite?.metadata?.ignoreMetadata &&
              window.ObsidianSite?.metadata?.featureOptions?.linkPreview?.enabled &&
              window.FilePreviewPopover?.initializeLink
            ) {
              window.FilePreviewPopover.initializeLink(link, target);
            }
          });
        };
      }
    } else if (attempts >= maxAttempts) {
      window.clearInterval(timer);
    }
  }, 50);
}

/* run once */
installEarlyLinkFix();
fixSVG();
forceLightMode();
addFooterStyle();

/* run again after page is ready */
document.addEventListener("DOMContentLoaded", () => {
  fixSVG();
  forceLightMode();
});

window.addEventListener("load", forceLightMode);

/* only watch for new content, not class changes */
new MutationObserver(() => {
  fixSVG();
}).observe(document.documentElement, {
  childList: true,
  subtree: true
});
</script>
