<script>
function fixSVG() {
  document.querySelectorAll('symbol image[preserveAspectRatio="none"]').forEach(el => {
    el.removeAttribute("preserveAspectRatio");
  });

  document.querySelectorAll('.excalidraw-embedded-img svg').forEach(svg => {
    if (svg.getAttribute("width") !== "100%") {
      svg.setAttribute("width", "100%");
    }
  });
}

function forceLightMode() {
  document.documentElement.classList.remove("theme-dark");
  document.documentElement.classList.add("theme-light");

  if (document.body) {
    document.body.classList.remove("theme-dark");
    document.body.classList.add("theme-light");
  }
}

fixSVG();
forceLightMode();

const observer = new MutationObserver(() => {
  fixSVG();
  forceLightMode();
});

observer.observe(document.documentElement, {
  childList: true,
  subtree: true,
  attributes: true,
  attributeFilter: ["class"]
});

document.addEventListener("DOMContentLoaded", forceLightMode);
window.addEventListener("load", forceLightMode);

/* simple footer only */
const style = document.createElement("style");
style.textContent = `
  html::after {
    content: "© 2026 Joel Dankert";
    position: fixed;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    line-height: 1;
    color: #fff !important;
    background: #000 !important;
    padding: 4px 8px;
    z-index: 2147483647;
    pointer-events: none;
    font-family: Arial, sans-serif;
    white-space: nowrap;
  }
`;
document.head.appendChild(style);
</script>
