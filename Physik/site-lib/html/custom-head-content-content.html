<script>
function fixSVG() {
  document.querySelectorAll('symbol image[preserveAspectRatio="none"]').forEach(el => {
    el.removeAttribute("preserveAspectRatio");
  });

  document.querySelectorAll('.excalidraw-embedded-img svg').forEach(svg => {
    if (svg.getAttribute("width") !== "100%") {
      svg.setAttribute("width", "100%");
    }
  });
}

function forceLight() {
  document.documentElement.classList.remove("theme-dark");
  document.documentElement.classList.add("theme-light");

  if (document.body) {
    document.body.classList.remove("theme-dark");
    document.body.classList.add("theme-light");
  }
}

function ensureFooter() {
  if (!document.body) return;

  let footer = document.getElementById("jd-footer");
  if (!footer) {
    footer = document.createElement("div");
    footer.id = "jd-footer";
    footer.textContent = "© 2026 Joel Dankert";
    document.body.appendChild(footer);
  }

  footer.style.cssText = `
    position: fixed !important;
    left: 0 !important;
    right: 0 !important;
    bottom: 0 !important;
    width: 100% !important;
    display: block !important;
    visibility: visible !important;
    opacity: 1 !important;
    z-index: 2147483647 !important;
    background: #000 !important;
    color: #fff !important;
    text-align: center !important;
    font-size: 12px !important;
    line-height: 1.4 !important;
    padding: 6px 0 !important;
    margin: 0 !important;
    border: 0 !important;
    border-radius: 0 !important;
    box-sizing: border-box !important;
    font-family: Arial, sans-serif !important;
    mix-blend-mode: normal !important;
    pointer-events: none !important;
  `;

  document.body.style.paddingBottom = "28px";
}

fixSVG();

new MutationObserver(() => {
  fixSVG();
  forceLight();
  ensureFooter();
}).observe(document.documentElement, {
  childList: true,
  subtree: true,
  attributes: true,
  attributeFilter: ["class"]
});

forceLight();

window.addEventListener("DOMContentLoaded", () => {
  forceLight();
  ensureFooter();
});

window.addEventListener("load", () => {
  forceLight();
  ensureFooter();
});

/* extra safety for pages that re-render later */
setInterval(() => {
  forceLight();
  ensureFooter();
}, 1000);
</script>
