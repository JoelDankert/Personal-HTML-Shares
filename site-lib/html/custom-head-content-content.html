<script>
function fixSVG() {

  /* remove broken preserveAspectRatio */
  document.querySelectorAll('symbol image[preserveAspectRatio="none"]').forEach(el => {
    el.removeAttribute("preserveAspectRatio");
  });

  /* force excalidraw SVGs to use responsive width */
  document.querySelectorAll('.excalidraw-embedded-img svg').forEach(svg => {
    if (svg.getAttribute("width") !== "100%") {
      svg.setAttribute("width", "100%");
    }
  });

}

fixSVG();

const observer = new MutationObserver(() => fixSVG());

observer.observe(document.documentElement, {
  childList: true,
  subtree: true
});

document.documentElement.classList.remove("theme-dark");
document.documentElement.classList.add("theme-light");
document.body.classList.remove("theme-dark");
document.body.classList.add("theme-light");
</script>
